<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>마이페이지 — First Touch</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .mypage-layout { padding: 80px 0 40px; min-height: 100vh; background: var(--bg); }
    .mypage-header { display: flex; align-items: center; gap: 20px; margin-bottom: 28px; }
    .mypage-avatar {
      width: 64px; height: 64px; border-radius: 50%; flex-shrink: 0;
      background: var(--green-light); color: var(--green); border: 2px solid var(--green-mid);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; font-weight: 800;
    }
    .mypage-name { font-size: 1.3rem; font-weight: 800; }
    .mypage-email { font-size: 0.82rem; color: var(--text-muted); }
    .mypage-role-badges { display: flex; gap: 6px; margin-top: 6px; }

    .mypage-tabs {
      display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px;
    }
    .mypage-tab {
      padding: 10px 18px; font-size: 0.85rem; font-weight: 600; color: var(--text-muted);
      border-bottom: 2px solid transparent; margin-bottom: -1px; cursor: pointer;
      transition: all var(--transition); font-family: inherit; background: none; border-top: none; border-left: none; border-right: none;
    }
    .mypage-tab.active { color: var(--green); border-bottom-color: var(--green); }
    .mypage-tab:hover:not(.active) { color: var(--text-primary); }
    .mypage-panel { display: none; }
    .mypage-panel.active { display: block; }

    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
    .info-card {
      background: white; border: 1px solid var(--border); border-radius: var(--radius);
      padding: 16px; box-shadow: var(--shadow-sm);
    }
    .info-label { font-size: 0.72rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; }
    .info-value { font-size: 0.9rem; font-weight: 600; color: var(--text-primary); }

    .booking-card {
      background: white; border: 1px solid var(--border); border-radius: var(--radius);
      padding: 18px; margin-bottom: 12px; box-shadow: var(--shadow-sm);
    }
    .booking-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .booking-card-title { font-size: 0.9rem; font-weight: 700; }
    .booking-card-meta { font-size: 0.78rem; color: var(--text-secondary); line-height: 1.6; }
    .booking-card-meta span { display: block; }
    .booking-card-actions { display: flex; gap: 8px; margin-top: 12px; }
    .booking-card-actions .btn-approve,
    .booking-card-actions .btn-reject {
      padding: 6px 14px; font-size: 0.78rem;
    }

    .status-badge { display: inline-block; padding: 3px 10px; border-radius: 100px; font-size: 0.7rem; font-weight: 700; }
    .status-pending { background: #FEF3C7; color: #B45309; }
    .status-coach_accepted { background: #DBEAFE; color: #2563EB; }
    .status-confirmed { background: var(--green-light); color: var(--green); }
    .status-rejected { background: #FEE2E2; color: #DC2626; }

    .empty-card {
      background: white; border: 1px solid var(--border); border-radius: var(--radius);
      padding: 40px; text-align: center; color: var(--text-muted); font-size: 0.85rem;
    }
    .empty-card-icon { font-size: 2rem; margin-bottom: 8px; }

    @media (max-width: 640px) {
      .info-grid { grid-template-columns: 1fr; }
      .mypage-header { flex-direction: column; text-align: center; }
    }
  </style>
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar">
    <div class="container">
      <div class="nav-left">
        <a href="index.html" class="nav-logo">
          <span class="ball">⚽</span> First<span>Touch</span>
        </a>
        <ul class="nav-links">
          <li><a href="index.html">레슨 찾기</a></li>
          <li><a href="community.html">커뮤니티</a></li>
        </ul>
      </div>
      <div class="nav-actions">
        <a href="login.html" class="btn-outline">로그인</a>
        <a href="login.html#signup" class="btn-outline">회원가입</a>
        <a href="register-coach.html" class="btn-coach-reg">코치 등록</a>
        <a href="register-venue.html" class="btn-venue-reg">구장 등록</a>
      </div>
    </div>
  </nav>

  <div class="mypage-layout">
    <div class="container">

      <!-- Profile header -->
      <div class="mypage-header">
        <div class="mypage-avatar" id="mypage-avatar">-</div>
        <div>
          <div class="mypage-name" id="mypage-name">-</div>
          <div class="mypage-email" id="mypage-email">-</div>
          <div class="mypage-role-badges" id="mypage-roles"></div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="mypage-tabs" id="mypage-tabs">
        <button class="mypage-tab active" data-panel="info">내 정보</button>
        <button class="mypage-tab" data-panel="bookings">내 예약</button>
        <!-- coach tab added dynamically -->
      </div>

      <!-- Info panel -->
      <div class="mypage-panel active" id="panel-info">
        <div class="info-grid" id="info-grid"></div>
        <div id="coach-status-section"></div>
        <div id="venue-status-section"></div>
      </div>

      <!-- My bookings (as student) -->
      <div class="mypage-panel" id="panel-bookings">
        <div id="my-bookings-list"></div>
      </div>

      <!-- Coach bookings (received requests) -->
      <div class="mypage-panel" id="panel-coach-bookings">
        <div id="coach-bookings-list"></div>
      </div>

    </div>
  </div>

  <script src="api.js"></script>
  <script>
    const user = getUser();
    if (!user || !getToken()) {
      window.location.href = '/login.html';
    }

    const statusLabels = {
      pending: '대기 중', coach_accepted: '코치 수락 (구장 배정 중)',
      confirmed: '확정', rejected: '거절됨'
    };
    const planLabels = { trial: '체험 레슨 (60분)', monthly: '정기 패키지 8회', camp: '집중 캠프 4회' };

    /* ----- Init ----- */
    async function initMypage() {
      // Profile
      document.getElementById('mypage-avatar').textContent = user.name.charAt(0);
      document.getElementById('mypage-name').textContent = user.name;
      document.getElementById('mypage-email').textContent = user.email;

      // Info grid
      const infoGrid = document.getElementById('info-grid');
      infoGrid.innerHTML = `
        <div class="info-card"><div class="info-label">이름</div><div class="info-value">${user.name}</div></div>
        <div class="info-card"><div class="info-label">이메일</div><div class="info-value">${user.email}</div></div>
        <div class="info-card"><div class="info-label">연락처</div><div class="info-value">${user.phone || '-'}</div></div>
        <div class="info-card"><div class="info-label">계정 유형</div><div class="info-value">${user.is_admin ? '관리자' : '일반 회원'}</div></div>
      `;

      // Role badges
      const roles = document.getElementById('mypage-roles');
      let badges = '';
      if (user.is_admin) badges += '<span class="status-badge status-confirmed">관리자</span>';

      // Coach status
      try {
        const { coach } = await apiFetch('/coaches/my');
        if (coach) {
          badges += `<span class="status-badge status-${coach.status}">코치 ${statusLabels[coach.status] || coach.status}</span>`;
          document.getElementById('coach-status-section').innerHTML = `
            <h3 style="font-size:0.85rem;font-weight:700;margin-bottom:12px;">코치 등록 현황</h3>
            <div class="booking-card">
              <div class="booking-card-header">
                <div class="booking-card-title">코치 등록 신청</div>
                <span class="status-badge status-${coach.status}">${statusLabels[coach.status] || coach.status}</span>
              </div>
              <div class="booking-card-meta">
                <span>스킬: ${coach.skills}</span>
                <span>지역: ${coach.region}</span>
                ${coach.bio ? `<span>소개: ${coach.bio}</span>` : ''}
              </div>
            </div>
          `;

          // If approved coach, add coach bookings tab
          if (coach.status === 'approved') {
            const tabsEl = document.getElementById('mypage-tabs');
            const coachTab = document.createElement('button');
            coachTab.className = 'mypage-tab';
            coachTab.dataset.panel = 'coach-bookings';
            coachTab.textContent = '받은 레슨 요청';
            tabsEl.appendChild(coachTab);
            coachTab.addEventListener('click', () => switchMypageTab(coachTab));
            loadCoachBookings();
          }
        }
      } catch (e) { /* no coach */ }

      // Venue status
      try {
        const { venues } = await apiFetch('/venues/my');
        if (venues.length > 0) {
          badges += `<span class="status-badge" style="background:#EFF6FF;color:#2563EB;">구장 오너</span>`;
          document.getElementById('venue-status-section').innerHTML = `
            <h3 style="font-size:0.85rem;font-weight:700;margin:20px 0 12px;">구장 등록 현황</h3>
            ${venues.map(v => `
              <div class="booking-card">
                <div class="booking-card-header">
                  <div class="booking-card-title">${v.name}</div>
                  <span class="status-badge status-${v.status}">${statusLabels[v.status] || v.status}</span>
                </div>
                <div class="booking-card-meta">
                  <span>주소: ${v.address}</span>
                  <span>타입: ${v.venue_type}</span>
                  ${v.equipment ? `<span>기구: ${v.equipment}</span>` : ''}
                </div>
              </div>
            `).join('')}
          `;
        }
      } catch (e) { /* no venues */ }

      roles.innerHTML = badges;

      // Load my bookings
      loadMyBookings();
    }

    /* ----- My bookings (student) ----- */
    async function loadMyBookings() {
      try {
        const { bookings } = await getMyBookings();
        const container = document.getElementById('my-bookings-list');
        if (bookings.length === 0) {
          container.innerHTML = '<div class="empty-card"><div class="empty-card-icon">📋</div>예약 내역이 없습니다.<br><a href="index.html" style="color:var(--green);font-weight:600;">코치 찾아보기</a></div>';
          return;
        }
        container.innerHTML = bookings.map(b => `
          <div class="booking-card">
            <div class="booking-card-header">
              <div class="booking-card-title">${planLabels[b.plan_type] || b.plan_type}</div>
              <span class="status-badge status-${b.status}">${statusLabels[b.status] || b.status}</span>
            </div>
            <div class="booking-card-meta">
              <span>코치: ${b.coach_name}</span>
              <span>일시: ${b.lesson_date} ${b.lesson_time}</span>
              <span>레슨비: ₩${Number(b.lesson_price).toLocaleString()} + 구장·기구: ₩${Number(b.venue_price).toLocaleString()} = <strong>₩${Number(b.total_price).toLocaleString()}</strong></span>
              ${b.venue_name ? `<span>구장: ${b.venue_name} (${b.venue_address})</span>` : '<span>구장: 배정 대기 중</span>'}
            </div>
          </div>
        `).join('');
      } catch (e) {
        document.getElementById('my-bookings-list').innerHTML = '<div class="empty-card">예약 목록을 불러올 수 없습니다.</div>';
      }
    }

    /* ----- Coach bookings (received) ----- */
    async function loadCoachBookings() {
      try {
        const { bookings } = await getCoachBookings();
        const container = document.getElementById('coach-bookings-list');
        if (bookings.length === 0) {
          container.innerHTML = '<div class="empty-card"><div class="empty-card-icon">🏅</div>아직 레슨 요청이 없습니다.</div>';
          return;
        }
        container.innerHTML = bookings.map(b => `
          <div class="booking-card">
            <div class="booking-card-header">
              <div class="booking-card-title">${b.student_name}님 — ${planLabels[b.plan_type] || b.plan_type}</div>
              <span class="status-badge status-${b.status}">${statusLabels[b.status] || b.status}</span>
            </div>
            <div class="booking-card-meta">
              <span>수강생: ${b.student_name} (${b.student_phone})</span>
              <span>일시: ${b.lesson_date} ${b.lesson_time}</span>
              <span>금액: ₩${Number(b.total_price).toLocaleString()}</span>
              ${b.venue_name ? `<span>구장: ${b.venue_name} (${b.venue_address})</span>` : ''}
            </div>
            ${b.status === 'pending' ? `
              <div class="booking-card-actions">
                <button class="btn-approve" onclick="handleCoachRespond(${b.id}, 'accept')">수락</button>
                <button class="btn-reject" onclick="handleCoachRespond(${b.id}, 'reject')">거절</button>
              </div>
            ` : ''}
          </div>
        `).join('');
      } catch (e) {
        document.getElementById('coach-bookings-list').innerHTML = '<div class="empty-card">목록을 불러올 수 없습니다.</div>';
      }
    }

    async function handleCoachRespond(bookingId, action) {
      const label = action === 'accept' ? '수락' : '거절';
      if (!confirm(`이 레슨을 ${label}하시겠습니까?`)) return;
      try {
        await respondToBooking(bookingId, action);
        alert(`✅ ${label}되었습니다.`);
        loadCoachBookings();
      } catch (err) {
        alert(err.message);
      }
    }

    /* ----- Tab switching ----- */
    function switchMypageTab(tab) {
      document.querySelectorAll('.mypage-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.mypage-panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('panel-' + tab.dataset.panel).classList.add('active');
    }

    document.querySelectorAll('.mypage-tab').forEach(tab => {
      tab.addEventListener('click', () => switchMypageTab(tab));
    });

    document.addEventListener('DOMContentLoaded', () => {
      updateNavUI();
      initMypage();
    });
  </script>
</body>
</html>
